<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home — Leave Something</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0b10;
      --text: #e8dcc8;
      --text-dim: #9e8f7a;
      --accent: #c8a96e;
      --accent-soft: rgba(200,169,110,0.12);
      --candle: #f4a940;
      --border: rgba(255,255,255,0.07);
      --card-bg: rgba(255,255,255,0.03);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', serif;
    }

    .stars {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute; background: #fff;
      border-radius: 50%; opacity: 0;
      animation: twinkle var(--d) ease-in-out infinite var(--delay);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--op); }
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 2.5rem;
      background: linear-gradient(to bottom, rgba(12,11,16,0.95), transparent);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: 1.5rem;
      letter-spacing: 0.3em; color: var(--text);
      text-decoration: none;
    }
    .back-link {
      color: var(--text-dim); text-decoration: none;
      font-size: 0.9rem; letter-spacing: 0.1em;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--accent); }

    main {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 6rem 2rem 3rem;
    }

    .post-container {
      width: 100%; max-width: 600px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.3s;
    }

    .post-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .post-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: 2rem;
      letter-spacing: 0.2em; color: var(--text-dim);
    }
    .post-header p {
      margin-top: 0.5rem;
      font-style: italic; font-size: 1rem;
      color: var(--text-dim); opacity: 0.5;
    }

    /* Tag selector */
    .tag-selector {
      display: flex; gap: 0.7rem;
      justify-content: center; flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .tag-opt {
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 20px;
      transition: all 0.3s;
    }
    .tag-opt:hover { border-color: var(--tag-c); color: var(--tag-c); }
    .tag-opt.selected {
      border-color: var(--tag-c);
      color: var(--tag-c);
      background: rgba(var(--tag-rgb), 0.1);
    }
    .tag-opt[data-tag="wish"] { --tag-c: #a8c5da; --tag-rgb: 168,197,218; }
    .tag-opt[data-tag="regret"] { --tag-c: #c4a0b0; --tag-rgb: 196,160,176; }
    .tag-opt[data-tag="prayer"] { --tag-c: #b8c4a0; --tag-rgb: 184,196,160; }
    .tag-opt[data-tag="thought"] { --tag-c: #c8a96e; --tag-rgb: 200,169,110; }

    /* Textarea */
    .textarea-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'EB Garamond', serif;
      font-size: 1.15rem;
      font-style: italic;
      line-height: 1.8;
      padding: 1.4rem 1.6rem;
      resize: none;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      letter-spacing: 0.02em;
    }
    textarea::placeholder {
      color: var(--text-dim);
      opacity: 0.4;
    }
    textarea:focus {
      border-color: rgba(200,169,110,0.3);
      box-shadow: 0 0 20px rgba(200,169,110,0.05);
    }
    .char-count {
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-dim);
      opacity: 0.4;
      margin-top: 0.4rem;
    }

    /* Submit */
    .submit-row {
      display: flex; justify-content: center;
      margin-top: 0.5rem;
    }
    .submit-btn {
      padding: 0.9rem 3rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'EB Garamond', serif;
      font-size: 1.05rem; letter-spacing: 0.2em;
      cursor: pointer; border-radius: 2px;
      transition: all 0.4s ease;
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--accent-soft);
      box-shadow: 0 0 30px rgba(200,169,110,0.15);
    }
    .submit-btn:disabled {
      opacity: 0.3; cursor: not-allowed;
    }

    /* Success state */
    .success {
      display: none;
      text-align: center;
      padding: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }
    .success .flame {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 12px rgba(244,169,64,0.6));
      animation: flicker 2s ease-in-out infinite;
    }
    @keyframes flicker {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1) rotate(3deg); }
    }
    .success h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: 1.8rem;
      letter-spacing: 0.15em; color: var(--text);
      margin-bottom: 0.5rem;
    }
    .success p {
      font-style: italic; color: var(--text-dim);
      margin-bottom: 1.5rem;
    }
    .success-links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .success-links a {
      color: var(--text-dim); text-decoration: none;
      font-size: 0.9rem; letter-spacing: 0.1em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
      transition: color 0.3s, border-color 0.3s;
    }
    .success-links a:hover { color: var(--accent); border-color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .note {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-dim);
      opacity: 0.35;
      margin-top: 1.5rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<nav>
  <a href="index.html" class="nav-logo">Home</a>
  <a href="wall.html" class="back-link">← the wall</a>
</nav>

<main>
  <div class="post-container" id="postContainer">
    <div class="post-header">
      <h2>leave something</h2>
      <p>no name. no judgment. just you.</p>
    </div>

    <div class="tag-selector">
      <button class="tag-opt" data-tag="wish">wish</button>
      <button class="tag-opt" data-tag="regret">regret</button>
      <button class="tag-opt" data-tag="prayer">prayer</button>
      <button class="tag-opt selected" data-tag="thought">thought</button>
    </div>

    <div class="textarea-wrap">
      <textarea id="thoughtText" placeholder="write what you can't say aloud..." maxlength="400"></textarea>
      <div class="char-count"><span id="charCount">0</span> / 400</div>
    </div>

    <div class="submit-row">
      <button class="submit-btn" id="submitBtn" disabled>release it</button>
    </div>

    <p class="note">anonymous. stored only on your device for now.</p>
  </div>

  <div class="success" id="successState">
    <span class="flame">🕯️</span>
    <h3>it's been left.</h3>
    <p>someone somewhere might find it and feel less alone.</p>
    <div class="success-links">
      <a href="wall.html">see the wall</a>
      <a href="random.html">read a stranger's world</a>
      <a href="post.html">leave another</a>
    </div>
  </div>
</main>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${3+Math.random()*5}s;--delay:${Math.random()*6}s;--op:${0.1+Math.random()*0.3};width:${1+Math.random()*1.5}px;height:${1+Math.random()*1.5}px;`;
    starsEl.appendChild(s);
  }

  let selectedTag = 'thought';

  document.querySelectorAll('.tag-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tag-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTag = btn.dataset.tag;
    });
  });

  const textarea = document.getElementById('thoughtText');
  const charCount = document.getElementById('charCount');
  const submitBtn = document.getElementById('submitBtn');

  textarea.addEventListener('input', () => {
    const len = textarea.value.length;
    charCount.textContent = len;
    submitBtn.disabled = len < 3;
  });

  submitBtn.addEventListener('click', () => {
    const text = textarea.value.trim();
    if (!text) return;

    const posts = JSON.parse(localStorage.getItem('home-posts') || '[]');
    posts.push({
      id: Date.now().toString(),
      text,
      tag: selectedTag,
      ts: Date.now(),
      candles: 0,
      candledBy: []
    });
    localStorage.setItem('home-posts', JSON.stringify(posts));

    document.getElementById('postContainer').style.display = 'none';
    const success = document.getElementById('successState');
    success.style.display = 'block';
  });
</script>
</body>
</html>
