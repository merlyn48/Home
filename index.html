<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0b10;
      --bg2: #13111a;
      --text: #e8dcc8;
      --text-dim: #9e8f7a;
      --accent: #c8a96e;
      --accent-soft: rgba(200, 169, 110, 0.15);
      --candle: #f4a940;
      --card-bg: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.07);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      overflow: hidden;
    }

    /* Stars */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--d) ease-in-out infinite var(--delay);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--op); }
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,169,110,0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    .landing {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 2rem;
    }

    .candle-icon {
      font-size: 2.5rem;
      animation: flicker 3s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(244,169,64,0.6));
    }
    @keyframes flicker {
      0%, 100% { transform: scale(1) rotate(-1deg); filter: drop-shadow(0 0 10px rgba(244,169,64,0.5)); }
      25% { transform: scale(1.03) rotate(1deg); filter: drop-shadow(0 0 18px rgba(244,169,64,0.8)); }
      50% { transform: scale(0.97) rotate(-0.5deg); filter: drop-shadow(0 0 8px rgba(244,169,64,0.4)); }
      75% { transform: scale(1.02) rotate(1.5deg); filter: drop-shadow(0 0 20px rgba(244,169,64,0.9)); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 10vw, 7rem);
      letter-spacing: 0.3em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 1.5s ease forwards 0.3s;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-style: italic;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 1.5s ease forwards 0.7s;
    }

    .enter-btn {
      margin-top: 1rem;
      padding: 0.9rem 2.8rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'EB Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.4s ease;
      opacity: 0;
      animation: fadeUp 1.5s ease forwards 1.1s;
      text-decoration: none;
      display: inline-block;
    }
    .enter-btn:hover {
      background: var(--accent-soft);
      box-shadow: 0 0 30px rgba(200,169,110,0.2);
      letter-spacing: 0.3em;
    }

    .footnote {
      position: fixed;
      bottom: 2rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeUp 1.5s ease forwards 1.5s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow"></div>

<div class="landing">
  <div class="candle-icon">🕯️</div>
  <h1>Home</h1>
  <p class="tagline">leave what you're carrying here.</p>
  <a href="wall.html" class="enter-btn">come in</a>
</div>

<p class="footnote">anonymous. always.</p>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --d: ${3 + Math.random() * 5}s;
      --delay: ${Math.random() * 6}s;
      --op: ${0.2 + Math.random() * 0.6};
      width: ${1 + Math.random() * 2}px;
      height: ${1 + Math.random() * 2}px;
    `;
    starsEl.appendChild(s);
  }
</script>
</body>
</html>
